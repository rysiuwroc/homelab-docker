# autobrr — IRC announce grabber for PolishTracker (ratio: first-in-swarm on wanted releases).
# Watches #pt-announce, matches movies/TV filters, pushes releases to Radarr/Sonarr (arr integration)
# so they grab via the existing qBittorrent client and import into /data/Movies + /data/TV Series.
#
# Config lives in the named volume (config.toml + SQLite), NOT in git. First run:
#   1. open http://192.168.0.212:7474 -> create admin user (setup wizard)
#   2. add PolishTracker indexer + IRC (needs your PT secrets: rsskey, nick, NickServ account/pass, IRC key)
#   3. add Radarr + Sonarr as clients (their API keys) and the movies/TV filters (see KB entry)
# autobrr is NOT LinuxServer.io -> no PUID/PGID; ownership handled via `user:`.
name: autobrr-stack
services:
  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.81.0
    container_name: autobrr
    restart: unless-stopped
    user: "1000:1000"
    networks: [arr_net]
    environment:
      TZ: "Europe/Warsaw"
    volumes:
      - autobrr_config:/config
    ports:
      - "7474:7474"
volumes:
  autobrr_config:
networks:
  arr_net:
    name: arr_net
    external: true
