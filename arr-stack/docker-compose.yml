# arr control-plane — Sonarr / Radarr / Prowlarr / Bazarr (LinuxServer.io)
# Media + downloads on the shared /mnt/data ext4 disk → hardlinks + atomic moves, no remote path mappings.
# Requires: external network `arr_net` and the /mnt/data filesystem to exist on the host.
name: arr-stacka

networks:
  arr_net:
    name: arr_net
    external: true

volumes:
  prowlarr_config:
  sonarr_config:
  radarr_config:
  bazarr_config:
  autobrr_config:
  cleanuparr_config:

x-arr-common: &arr-common
  restart: unless-stopped
  networks: [arr_net]
  environment:
    PUID: "1000"
    PGID: "1000"
    UMASK: "022"
    TZ: "Europe/Warsaw"

services:
  prowlarr:
    <<: *arr-common
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    volumes:
      - prowlarr_config:/config
    ports:
      - "9696:9696"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sonarr:
    <<: *arr-common
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    volumes:
      - sonarr_config:/config
      - /mnt/cifs/media-f:/data
      - /mnt/cifs/media-e:/archive
    ports:
      - "8989:8989"
    depends_on: [prowlarr]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  radarr:
    <<: *arr-common
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    volumes:
      - radarr_config:/config
      - /mnt/cifs/media-f:/data
      - /mnt/cifs/media-e:/archive
    ports:
      - "7878:7878"
    depends_on: [prowlarr]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bazarr:
    <<: *arr-common
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    volumes:
      - bazarr_config:/config
      - /mnt/cifs/media-f:/data
      - /mnt/cifs/media-e:/archive
    ports:
      - "6767:6767"
    depends_on: [sonarr, radarr]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:6767/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- arr companions (folded in from separate stacks) ---
  # autobrr: IRC grabber for PolishTracker -> pushes movies/TV to Radarr/Sonarr (ratio: first-in-swarm).
  #   Config (config.toml + SQLite) in autobrr_config volume; PT secrets entered in autobrr UI, NOT git.
  autobrr:
    image: ghcr.io/autobrr/autobrr:v1.81.0
    container_name: autobrr
    restart: unless-stopped
    # runs as root (image default): autobrr has no LSIO chown-init, so it must own /config to write config.toml
    networks: [arr_net]
    environment:
      TZ: "Europe/Warsaw"
    volumes:
      - autobrr_config:/config
    ports:
      - "7474:7474"

  # cleanuparr: queue-cleaner (replaces decluttarr). All rule config via web UI/SQLite in the volume.
  #   NO /data mount on purpose (orphan/unlinked file deletion structurally impossible = seed-safe).
  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:2.9.15
    container_name: cleanuparr
    restart: unless-stopped
    networks: [arr_net]
    environment:
      PORT: "11011"
      PUID: "1000"
      PGID: "1000"
      UMASK: "022"
      TZ: "Europe/Warsaw"
    volumes:
      - cleanuparr_config:/config
    ports:
      - "11011:11011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
