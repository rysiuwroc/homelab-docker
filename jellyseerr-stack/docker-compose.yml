# jellyseerr-stack — Jellyseerr/Seerr request manager (behind Caddy at seer.rysiukiewicz.com).
# Image resolved from the migration snapshot's OCI labels: seerr-team/seerr v3.0.1.
name: jellyseerr-stack

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.0.1
    container_name: seerr
    init: true
    restart: unless-stopped
    ports:
      - "5055:5055/tcp"
    environment:
      - TZ=Europe/Warsaw
      - PORT=5055
      - LOG_LEVEL=debug
    volumes:
      - jellyseerr-data:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 20s
      retries: 3

volumes:
  jellyseerr-data:
    external: true
