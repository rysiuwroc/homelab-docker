# slack-meter-stack — Slack Activity Meter (FastAPI + headless Playwright/Chromium connector).
# Image = the existing local build, retagged to slack-activity-meter:local on .212
# (snapshot has no registry; retag avoids a rebuild). To rebuild from .69 source later, swap
# `image:` for `build: .` with the source committed here.
# The real Slack auth secret is NOT env — it's slack_cookies.json, bind-mounted from
# /home/rysiu/slack-meter/slack_cookies.json (refresh there + restart; no container edit).
name: slack-meter-stack

services:
  app:
    image: slack-activity-meter:local
    container_name: slack-activity-meter-app-1
    restart: unless-stopped
    init: true                 # tini jako PID1 - reapuje zombie chrome-headless (Playwright)
    shm_size: "1gb"            # required for Chromium/Playwright stability
    ports:
      - "8080:8080"
    environment:
      - TZ=Europe/Warsaw
      - DATA_DIR=/data
      - PORT=8080
      - POLL_INTERVAL_SEC=60
      - CONNECTOR_BACKEND_URL=http://127.0.0.1:8080
      - CONNECTOR_SLACK_URL=${CONNECTOR_SLACK_URL}   # secret-ish (workspace/enterprise id) -> Portainer env, not git
    volumes:
      - /home/rysiu/docker-binds/bind-9c827ed09c48:/data   # activity.db + emoji/ + tracked_emails.txt
      - /home/rysiu/slack-meter/slack_cookies.json:/data/slack_cookies.json   # Slack session auth — REFRESH HERE: overwrite this host file + restart container (no docker exec)
