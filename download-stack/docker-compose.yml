# download clients — qBittorrent + NZBGet (LinuxServer.io)
# Same /mnt/data mount as the arr stack so downloads + library share one filesystem (hardlinks).
name: download-stack
networks:
  arr_net:
    name: arr_net
    external: true
volumes:
  qbittorrent_config:
  nzbget_config:
services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    networks: [arr_net]
    environment:
      PUID: "1000"
      PGID: "1000"
      UMASK: "022"
      TZ: "Europe/Warsaw"
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "51413"
    volumes:
      - qbittorrent_config:/config
      - /mnt/cifs/media-f:/data
    ports:
      - "8088:8080"
      - "51413:51413"
      - "51413:51413/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8080/api/v2/app/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    restart: unless-stopped
    networks: [arr_net]
    environment:
      PUID: "1000"
      PGID: "1000"
      UMASK: "022"
      TZ: "Europe/Warsaw"
    volumes:
      - nzbget_config:/config
      - /mnt/cifs/media-f:/data
    ports:
      - "6789:6789"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:6789/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
