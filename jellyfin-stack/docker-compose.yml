# jellyfin-stack — Jellyfin media server (open-source Plex alternative), LinuxServer.io image
# (same PUID/UMASK convention as the arr stack). Reads the SAME media as Plex/arr via the
# existing CIFS mounts, READ-ONLY — Jellyfin never writes to the media (metadata lives in /config).
# Phase 1 = software transcode. Phase 2 adds GPU offload to .69 via ffmpeg-over-ip (Jellyfin
# "FFmpeg path" override + a bind-mounted client binary — no structural compose change needed).
name: jellyfin-stack

networks:
  arr_net:
    name: arr_net
    external: true

volumes:
  jellyfin_config:
  threadfin_conf:

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    networks: [arr_net]
    environment:
      PUID: "1000"
      PGID: "1000"
      UMASK: "022"
      TZ: "Europe/Warsaw"
    volumes:
      - jellyfin_config:/config
      - /mnt/cifs/media-f:/data:ro
      - /mnt/cifs/media-e:/archive:ro
      # GPU transcode offload (Phase 2): replace the bundled ffmpeg with the ffmpeg-over-ip
      # client so transcodes run on the RTX 2070 on .69 (server listens :5050). ffprobe stays
      # local. Client binary + its config (with the HMAC secret, kept OFF git) live on the host.
      - /home/rysiu/ffmpeg-over-ip/ffmpeg-over-ip-client:/usr/lib/jellyfin-ffmpeg/ffmpeg:ro
      - /home/rysiu/ffmpeg-over-ip/ffmpeg-over-ip.client.jsonc:/usr/lib/jellyfin-ffmpeg/ffmpeg-over-ip.client.jsonc:ro
    ports:
      - "8096:8096"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Threadfin — IPTV middleware (xTeVe fork): merges the M3U + XMLTV from the Xtream provider,
  # filters/maps channels, buffers the single upstream connection, and exports a clean M3U +
  # XMLTV for Jellyfin Live TV (Jellyfin reaches it internally at http://threadfin:34400).
  threadfin:
    image: fyb3roptik/threadfin:latest
    container_name: threadfin
    restart: unless-stopped
    networks: [arr_net]
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Warsaw"
    volumes:
      - threadfin_conf:/home/threadfin/conf
    tmpfs:
      - /tmp/threadfin
    ports:
      - "34400:34400"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:34400/web/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
