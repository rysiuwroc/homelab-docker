# pte-points-stack — PolishTracker bonus-point farmer.
# Seeduje duzo malych, rzadkich, starszych torrentow filmowych ORAZ gier/konsol (heterogeniczne
# rozmiary) w dedykowanej kategorii qBit `points` na F: (media-f), seed-only (nie importowane do biblioteki).
# Zakres stron crawlu, prog score i min-size per kategoria sa SAMOSTROJACE (uczone w runtime) - brak env pokretel.
# Skrypt na hoscie /home/rysiu/pte-points/grabber.py (bind absolutny - relatywne bind-y repo
# NIE dzialaja w git-stackach Portainera; wzorzec jak decluttarr). Sekrety z Portainer stack env.
name: pte-points-stack

networks:
  arr_net:
    name: arr_net
    external: true

volumes:
  pte_points_state:

services:
  pte-points:
    image: python:3.13-slim
    container_name: pte-points
    restart: unless-stopped
    networks: [arr_net]              # ta sama siec co qbittorrent -> http://qbittorrent:8080 (subnet-whitelist, bez hasla)
    environment:
      TZ: "Europe/Warsaw"
      # --- sekrety: ustaw w Portainer stack env. Brak -> skrypt konczy exit(1) i restartuje (widoczne w logach).
      #     (compose-config w CI nie ma tych env, wiec `:-` zamiast `:?` - twarda walidacja jest w grabber.py) ---
      PTE_API_KEY: "${PTE_API_KEY:-}"
      PTE_RSSKEY: "${PTE_RSSKEY:-}"
      # --- integracja qBit ---
      QBIT_URL: "http://qbittorrent:8080"
      QBIT_CATEGORY: "points"
      QBIT_SAVEPATH: "/data/Downloads/torrents/points"   # /data = /mnt/cifs/media-f (F:)
      # --- priorytet: `ratio` (autobrr) ZAWSZE na topie kolejki qBit (osobny watek daemon) ---
      #     qBit wywlaszcza (queuedDL) najnizszy aktywny `points` i puszcza `ratio`. Wymaga Queueing ON w qBit.
      RATIO_CATEGORY: "ratio"         # kategoria autobrr trzymana na top
      PRIO_TICK_SEC: "10"             # co ile s wynosic `ratio` na top (lekki call - moze nakurwiac)
      # --- polityka doboru: SAMOSTROJACA (crawl, prog score, min-size per kat auto) ---
      BUDGET_GB: "2000"               # jedyny twardy limit: suma GB w kategorii points
      MIN_SEEDERS: "2"                # dolny prog zywotnosci (>=tyle seederow zeby sie dociagnelo)
      CATS: "6,7,9,11,12,14"          # kategorie do farmienia (filmy + gry/konsole - rozne rozmiary)
      # --- tempo: cykl + opoznienia anty-ban (crawl/prog score/min-size sa samostrojace) ---
      INTERVAL_MIN: "15"              # co 15 min: reap stalli + top-up wolnego miejsca do budzetu
      PAGE_SLEEP_SEC: "1.5"           # poczatkowe/dolne opoznienie miedzy requestami; limiter uczy sie z 429
      ADD_SLEEP_SEC: "1"              # odstep miedzy pobraniami .torrent (anty-ban)
      REAP_STALL_MIN: "20"            # nuke (z plikami) utknietych: stalledDL/metaDL bezczynne >20min. NIGDY ukonczonych/stalledUP. guard REAP tyka tylko `ratio`
    volumes:
      - /home/rysiu/pte-points/grabber.py:/app/grabber.py:ro   # host bind (patrz naglowek); aktualizacja skryptu = scp na host
      - pte_points_state:/state
    command: ["python", "-u", "/app/grabber.py"]
