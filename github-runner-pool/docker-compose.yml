name: github-runner-pool

x-runner-environment: &runner-environment
  GITHUB_ORG: "${GITHUB_ORG:?set GITHUB_ORG in Portainer stack env}"
  RUNNER_GROUP: "${RUNNER_GROUP:?set RUNNER_GROUP in Portainer stack env}"
  RUNNER_LABELS: "${RUNNER_LABELS:?set RUNNER_LABELS in Portainer stack env}"
  DOCKER_GID: "${DOCKER_GID:?set DOCKER_GID to the host docker.sock group id}"
  RUNNER_WORKDIR: /runner/_work
  RUNNER_TOOL_CACHE: /runner/_tool

x-runner-common: &runner-common
  image: "github-runner-pool:${RUNNER_VERSION:?set RUNNER_VERSION in Portainer stack env}"
  pull_policy: never
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"
  stop_grace_period: 2m
  group_add:
    - "${DOCKER_GID:?set DOCKER_GID to the host docker.sock group id}"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
  healthcheck:
    test: ["CMD-SHELL", "test -s /run/runner-ready && test -s /run/runner.pid && kill -0 \"$(cat /run/runner.pid)\""]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s

services:
  github-runner-01:
    <<: *runner-common
    container_name: github-runner-01
    environment:
      <<: *runner-environment
      RUNNER_NAME: ci-linux-01
    volumes:
      - github-runner-01-work:/runner/_work
      - github-runner-01-config:/runner/config
      - github-runner-01-tool-cache:/runner/_tool
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: "${GITHUB_RUNNER_API_TOKEN_FILE:?set GITHUB_RUNNER_API_TOKEN_FILE to a host mode-0600 file}"
        target: /run/secrets/github-runner-api-token
        read_only: true
        bind:
          create_host_path: false

  github-runner-02:
