apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-data
  namespace: arc-runners
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-package-cache
  namespace: arc-runners
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus-package-cache
  template:
    metadata:
      labels:
        app: nexus-package-cache
    spec:
      securityContext:
        fsGroup: 200
      containers:
        - name: nexus
          image: sonatype/nexus3@sha256:2f5fe227cc673b2ac3ec8ac2ebe4c4e3dfa4717ac837396be4469917e5254849
          ports:
            - containerPort: 8081
          env:
            - name: INSTALL4J_ADD_VM_PARAMS
              value: -Xms1200m -Xmx1200m -XX:MaxDirectMemorySize=1200m
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18
          livenessProbe:
            httpGet:
              path: /service/rest/v1/status
              port: 8081
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /nexus-data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nexus-data
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-package-cache
  namespace: arc-runners
spec:
  selector:
    app: nexus-package-cache
  ports:
    - port: 8081
      targetPort: 8081
