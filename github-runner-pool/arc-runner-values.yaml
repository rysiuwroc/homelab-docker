githubConfigUrl: https://github.com/MRysiukiewicz
githubConfigSecret: arc-github-auth
runnerGroup: linux-docker-ci
runnerScaleSetName: linux-docker-ci
scaleSetLabels: [self-hosted, linux, x64, docker]
controllerServiceAccount:
  namespace: arc-systems
  name: arc-gha-rs-controller
minRunners: 7
maxRunners: 15
template:
  spec:
    initContainers:
      - name: init-dind-externals
        image: local/arc-ci-runner:2026-07-23
        imagePullPolicy: Never
        command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
        volumeMounts:
          - name: dind-externals
            mountPath: /home/runner/tmpDir
      - name: dind
        image: docker@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659
        args:
          - dockerd
          - --host=unix:///var/run/docker.sock
          - --group=$(DOCKER_GROUP_GID)
          - --mtu=1450
          - --registry-mirror=http://registry-docker-cache.arc-runners.svc.cluster.local:5000
          - --insecure-registry=registry-docker-cache.arc-runners.svc.cluster.local:5000
          - --insecure-registry=registry-mcr-images.arc-runners.svc.cluster.local:5000
          - --default-network-opt=bridge=com.docker.network.driver.mtu=1450
        env:
          - name: DOCKER_GROUP_GID
            value: "123"
        securityContext:
          privileged: true
        restartPolicy: Always
        startupProbe:
          exec:
            command: [docker, info]
          failureThreshold: 24
          periodSeconds: 5
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
          - name: dind-externals
            mountPath: /home/runner/externals
      - name: prewarm-ci-images
        image: docker@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659
        command:
          - /bin/sh
          - -ec
          - |
            for image in \
              registry-mcr-images.arc-runners.svc.cluster.local:5000/dotnet/sdk:10.0 \
              postgres:17-alpine
            do
              if docker image inspect "$image" >/dev/null 2>&1; then
                printf '%s\n' "Prewarm image already present: $image"
              elif ! docker pull "$image"; then
                printf '%s\n' "WARNING: could not prewarm $image; job startup will pull it instead." >&2
              fi
            done
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
        volumeMounts:
          - name: dind-sock
            mountPath: /var/run
    containers:
      - name: runner
        image: local/arc-ci-runner:2026-07-23
        imagePullPolicy: Never
        command: ["/home/runner/run.sh"]
        env:
          - name: DOCKER_HOST
            value: unix:///var/run/docker.sock
          - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
            value: "120"
        volumeMounts:
          - name: work
            mountPath: /home/runner/_work
          - name: dind-sock
            mountPath: /var/run
    volumes:
      - name: work
        emptyDir: {}
      - name: dind-sock
        emptyDir: {}
      - name: dind-externals
        emptyDir: {}
